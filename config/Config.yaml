---
camera:
  width: 640
  height: 480
  fps: 30
  exposure: 10000.0
  gain: 10.0

preprocess:
  gaussian_k_size: 5        # 高斯模糊核大小
  gaussian_sigma: 1.0       # 高斯模糊sigma
  rdc_exposure_x: 0.32       # 降曝光参数1（保持对比度）
  rdc_exposure_y: -70.0       # 降曝光参数2（不改变亮度）
  morph_k_size: 5           # 形态学操作核大小（减小，避免灯条断裂）
  min_area: 40.0            # 灯条最小面积
  max_area: 5000.0          # 灯条最大面积
  min_ratio: 2.0            # 灯条最小宽高比 
  max_ratio: 4.0           # 灯条最大宽高比
  max_angle: 89.0           # 灯条最大偏转角

armor:
  max_height_diff: 9.0     # 灯条最大高度差
  min_center_dist: 8.0     # 最小中心距离
  max_center_dist: 350.0     # 最大中心距离
  max_angle_diff: 27.5      # 最大角度差
  min_w_h_ratio: 2.0        # 装甲板最小宽高比
  max_w_h_ratio: 4.0        # 装甲板最大宽高比

ballistic:
  bullet_speed: 28.0        # 弹速
  gravity: 9.8              # 重力加速度
  camera_offset_x: 0        # 偏移X
  camera_offset_y: -50      # 偏移Y
  camera_offset_z: 100      # 偏移Z

kalman:
  processNoisePos: 0.0001       # 位置过程噪声
  processNoiseVel: 0.01         # 速度过程噪声
  measurementNoisePos: 0.01     # 观测噪声
  initialErrorCov: 1.0          # 初始误差协方差
  angularVelocity: 7.33         # 水平转速 (rad/s)

serial:
  port: "/dev/ttyUSB0"    # 串口名（修正拼写错误）
  baud: 115200            # 波特率
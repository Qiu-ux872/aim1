---
camera:
  width: 640
  height: 480pre
  fps: 30
  exposure: 1000

preprocess:
  gaussian_k_size: 3      # 高斯模糊核大小
  gaussian_sigma: 1.3     # 高斯模糊sigma
  rdc_exposure_x: 0.6     # 降曝光参数1
  rdc_exposure_y: -30.0   # 降曝光参数2
  min_area: 30.0          # 灯条最小面积
  max_area: 50.0          # 灯条最大面积
  min_ratio: 2.0          # 灯条最小宽高比
  max_ratio: 4.0          # 灯条最大宽高比
  max_angle: 25.0         # 灯条最大偏转角

armor:
  max_height_diff: 3.0    # 灯条最大高度差
  min_dist_ratio: 1.2     # 最小距离比
  max_dist_ratio: 4.5     # 最大距离比
  max_angle_diff: 30.0    # 最大角度差
  w_h_ratio: 1.1          # 装甲板宽高比

serial:
  port: "/dev/tyUSB0"     # 串口名
  baud: 115200            # 波特率
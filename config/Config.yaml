camera:
  width: 1280
  height: 720
  fps: 120
  exposure: 10000.0
  gain: 10.0
  rgb_gain_r: 1.3
  rgb_gain_g: 1.3
  rgb_gain_b: 1.3

preprocess:
  color: 1    # 0 for red, 1 for blue
  gaussian_k_size: 5
  gaussian_sigma: 1.3
  rdc_exposure_x: 0.35
  rdc_exposure_y: -70.0
  morph_k_size: 5
  min_area: 75.0
  max_area: 5000.0
  min_ratio: 1.9
  max_ratio: 4.2
  max_angle: 65.0

armor:
  max_height_diff: 7.5
  min_center_dist: 23.0
  max_center_dist: 280.0
  max_angle_diff: 55.0
  min_w_h_ratio: 1.0
  max_w_h_ratio: 4.0
  min_center_bar_ratio: 0.9
  max_center_bar_ratio: 1.4

ballistic:
  bulletSpeed: 30.0
  gravity: 9.8
  camera_offset_x: 0.0
  camera_offset_y: -40.43
  camera_offset_z: 64.35

kalman:
  processNoisePos: 0.1
  processNoiseVel: 1.8
  measurementNoisePos: 0.01
  yawProcessNoisePos: 0.1
  yawProcessNoiseVel: 2.5
  yawMeasurementNoise: 0.01
  initialErrorCov: 1.5
  angularVelocity: 7.33

target_select:
  w_center: 0.4
  w_distance: 0.4
  w_stability: 0.2
  hysteresis: 0.1
  max_tracked: 10
  max_distance_mm: 3000
  lost_timeout_ms: 500

serial:
  port: "/dev/ttyUSB0"
  baud: 115200

udp:
  enabled: true
  host: "172.20.10.2"
  port: 9870

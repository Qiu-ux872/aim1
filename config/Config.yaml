---
camera:
  width: 1280
  height: 720
  fps: 120
  exposure: 10000.0
  gain: 10.0
  rgb_gain_r: 1.3          # 红色通道增益 (0.0-4.0)
  rgb_gain_g: 1.3          # 绿色通道增益 (0.0-4.0)
  rgb_gain_b: 1.3          # 蓝色通道增益 (0.0-4.0)

preprocess:
  gaussian_k_size: 5        # 高斯模糊核大小
  gaussian_sigma: 1.1       # 高斯模糊sigma
  rdc_exposure_x: 0.4       # 降曝光参数1（保持对比度）
  rdc_exposure_y: -73.0       # 降曝光参数2（不改变亮度）
  morph_k_size: 5           # 形态学操作核大小（减小，避免灯条断裂）
  min_area: 85.0            # 灯条最小面积
  max_area: 10000.0          # 灯条最大面积
  min_ratio: 1.8            # 灯条最小宽高比 
  max_ratio: 4.3            # 灯条最大宽高比
  max_angle: 55.0           # 灯条最大偏转角

armor:
  max_height_diff: 8.5  # 灯条最大高度差
  min_center_dist: 35.0     # 最小中心距离
  max_center_dist: 200.0     # 最大中心距离
  max_angle_diff: 2.0      # 最大角度差
  min_w_h_ratio: 1.5        # 装甲板最小宽高比
  max_w_h_ratio: 3.7        # 装甲板最大宽高比
  min_center_bar_ratio: 0.9    # 最小中心条比率  
  max_center_bar_ratio: 1.25    # 最大中心条比率

ballistic:
  bulletSpeed: 30.0        # 弹速
  gravity: 9.8              # 重力加速度
  camera_offset_x: 6.75
  camera_offset_y: -42.50
  camera_offset_z: 18.90

kalman:
  processNoisePos: 0.5          # 位置过程噪声：增大 相信位置观测 减小 相信模型预测
  processNoiseVel: 1.2          # 速度过程噪声：增大 响应速度变快 减小 响应速度变慢
  measurementNoisePos: 0.01      # 位置观测噪声：增大 相信模型预测 减小 相信位置观测
  yawProcessNoisePos: 0.01      # 角度过程噪声：增大 相信角度观测 减小 相信模型预测
  yawProcessNoiseVel: 2.5       # 角速度过程噪声：增大 角速度响应变快 减小 角跟踪实际变化能力变差
  yawMeasurementNoise: 0.01      # 角度观测噪声：增大 信任角速度观测 减小 直接采用观测角度
  initialErrorCov: 1.0          # 初始误差协方差：增大 启动阶段响应速度变快 减小 启动阶段响应速度变慢
  angularVelocity: 7.33         

yolo:
  model_path: "model/best.onnx" 
  conf_threshold: 0.39        #置信度阈值
  nms_threshold: 0.4          #NMS阈值
  input_width: 640
  input_height: 640
  inference_interval: 1 # 每隔多少帧进行一次YOLO推理，减少计算负担

serial:
  port: "/dev/ttyUSB0"    # 串口名
  baud: 115200            # 波特率

udp:
  enabled: true               # 是否启用UDP发送
  host: "172.20.10.2"       # 接收端IP
  port: 9870                  # 端口号 与PlotJuggler设置的端口一致
